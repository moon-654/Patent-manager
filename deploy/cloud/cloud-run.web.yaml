apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: patent-manager
spec:
  template:
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/cloud-run-source-deploy/patent-manager/patent-manager:latest
          ports:
            - containerPort: 8080
          env:
            - name: NEXT_PUBLIC_API_URL
              value: /api/v1
            - name: API_PROXY_TARGET
              value: https://patent-manager-api.example.run.app
