apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: patent-manager-api
spec:
  template:
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/cloud-run-source-deploy/patent-manager/patent-manager-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: STORAGE_BACKEND
              value: gcs
            - name: STORAGE_PREFIX
              value: generated-docs
            - name: GCS_BUCKET_NAME
              value: patent-manager-documents
            - name: PDF_FONT_PATH
              value: /usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc
