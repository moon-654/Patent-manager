apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: patent-manager-web
spec:
  template:
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: patent-manager-runtime
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/patent-manager/web:latest
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "8080"
            - name: NEXT_PUBLIC_API_URL
              value: https://patent-manager-api-xxxxx.a.run.app/api/v1
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
