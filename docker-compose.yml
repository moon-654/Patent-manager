version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: patent-manager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: patent_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - patent_manager_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: patent-manager-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - patent_manager_redis:/data

volumes:
  patent_manager_postgres:
  patent_manager_redis:

